name: PHP checks

on:
  push:
    branches: [main]
  pull_request:

jobs:
  syntax-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: pdo_sqlite, curl, fileinfo, openssl

      - name: PHP syntax
        run: |
          find . \
            -path './var' -prune -o \
            -path './tools' -prune -o \
            -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Smoke test
        run: php tests/smoke.php

      - name: Orchestrated UI flow test
        run: php tests/orchestrated_flows.php

      - name: Security negative flow test
        run: php tests/security_negative_flows.php
